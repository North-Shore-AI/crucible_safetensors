<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background and glowing gradients -->
    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="sliceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E62" />
      <stop offset="100%" stop-color="#FF9966" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4FACFE" stop-opacity="0.4" />
    </linearGradient>
    
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon Background and Border -->
  <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" 
           fill="#0F1115" fill-opacity="0.9" 
           stroke="url(#cyberCyan)" stroke-width="5" stroke-linejoin="round"
           filter="url(#neonGlow)" />
           
  <!-- Isometric Grid (Tensors) -->
  <g transform="translate(100, 105) scale(0.85)">
    <!-- Back grid lines -->
    <!-- X-axis lines (isometric angle ~30 deg) -->
    <path d="M -60,-35 L 60,35 M -60,-15 L 60,55 M -60,5 L 60,75 M -60,25 L 60,95" stroke="url(#gridGrad)" stroke-width="1.5" />
    <!-- Y-axis lines (isometric angle ~150 deg) -->
    <path d="M 60,-35 L -60,35 M 60,-15 L -60,55 M 60,5 L -60,75 M 60,25 L -60,95" stroke="url(#gridGrad)" stroke-width="1.5" />
    
    <!-- Highlighted Tensor Slice -->
    <polygon points="-20,12 20,35 20,55 -20,32" fill="url(#sliceGrad)" fill-opacity="0.75" stroke="#FF5E62" stroke-width="1.5" filter="url(#neonGlow)" />
    
    <!-- Grid Nodes (Tensors representation) -->
    <circle cx="-40" cy="-23" r="3" fill="#00F2FE" />
    <circle cx="0" cy="-45" r="3" fill="#00F2FE" />
    <circle cx="40" cy="-23" r="3" fill="#00F2FE" />
    <circle cx="-40" cy="18" r="3" fill="#4FACFE" />
    <circle cx="0" cy="-3" r="4" fill="#00F2FE" filter="url(#neonGlow)" />
    <circle cx="40" cy="18" r="3" fill="#4FACFE" />
    <circle cx="-40" cy="58" r="3" fill="#4FACFE" />
    <circle cx="0" cy="38" r="3" fill="#FF9966" />
    <circle cx="40" cy="58" r="3" fill="#4FACFE" />
  </g>

  <!-- Glowing Security Shield (Safety/Validation) -->
  <path d="M 100,50 
           C 115,50 130,45 135,40 
           L 135,80 
           C 135,110 110,128 100,132 
           C 90,128 65,110 65,80 
           L 65,40 
           C 70,45 85,50 100,50 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
  
  <!-- Subtle Internal Lock Emblem inside Shield -->
  <path d="M 94,88 L 94,80 C 94,76 97,74 100,74 C 103,74 106,76 106,80 L 106,88 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
  <rect x="91" y="88" width="18" height="12" rx="2" fill="url(#cyberCyan)" />
</svg>
